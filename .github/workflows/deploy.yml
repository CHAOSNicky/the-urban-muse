name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Java 21
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      # Build Spring Boot backend
      - name: Build Spring Boot
        run: |
          cd backend/loginwebapp
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # Build frontend (Vite -> dist)
      - name: Build React
        run: |
          cd frontend/client
          npm install
          npm run build

      # Normalize backend JAR name
      - name: Normalize backend jar name
        run: |
          mv backend/loginwebapp/target/*.jar backend/loginwebapp/target/app.jar

      # Copy backend + frontend to EC2 (UNCHANGED SSH KEY PART)
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: |
            backend/loginwebapp/target/app.jar
            frontend/client/dist
          target: /home/deploy/deploy

      # Restart backend service only
      - name: Restart backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo systemctl restart loginwebapp
