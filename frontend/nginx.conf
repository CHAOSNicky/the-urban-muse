# 1. Redirect all WWW traffic to Non-WWW (The Safari Fix)
# 1. Cleaner Redirect for Safari
server {
    listen 80;
    server_name www.theurbanmuse.store;

    # Explicitly set the type so Safari knows it's a webpage
    default_type text/html;

    location / {
        return 301 http://theurbanmuse.store:3000$request_uri;
    }
}

# 2. Main Server Block
server {
    listen 80;
    server_name theurbanmuse.store;

    # Global Proxy Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Backend API
    location /api/ {
        proxy_pass http://backend:8080;
    }

    # Auth logic with CORS for Safari
    location /auth/ {
        proxy_pass http://backend:8080;

        # Handle Safari Preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'http://theurbanmuse.store:3000' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,Keep-Alive,X-Requested-With,If-Modified-Since' always;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' 'http://theurbanmuse.store:3000' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # Static Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}